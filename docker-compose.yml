services:
  backend:
    build: ./backend
    ports:
      - "8000:8080"
    environment:
      - PORT=8080
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # For production swap to Postgres, e.g.:
      # - DATABASE_URL=postgresql+psycopg://user:pass@db:5432/community_hero

  frontend:
    build: ./frontend
    ports:
      - "5173:8080"
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend
